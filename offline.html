<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline | AUREX Design Studio</title>
    <meta name="theme-color" content="#4CAF50">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 30px;
            opacity: 0.8;
            line-height: 1.6;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            background: linear-gradient(135deg, #4CAF50, #03A9F4);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(76,175,80,0.3);
        }
        .retry-btn {
            margin-top: 20px;
            background: rgba(255,255,255,0.2);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .signal-bars {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 20px;
        }
        .signal-bar {
            width: 8px;
            height: 30px;
            background: #4CAF50;
            border-radius: 4px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .signal-bar:nth-child(1) { height: 15px; animation-delay: 0s; }
        .signal-bar:nth-child(2) { height: 25px; animation-delay: 0.2s; }
        .signal-bar:nth-child(3) { height: 35px; animation-delay: 0.4s; }
        .signal-bar:nth-child(4) { height: 20px; animation-delay: 0.6s; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="signal-bars">
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
            <div class="signal-bar"></div>
        </div>
        <div class="offline-icon">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry! Once you're back online, you'll be able to access all content again.</p>
        <a href="/" class="btn" id="retryBtn">
            <i class="fas fa-sync-alt"></i> Try Again
        </a>
        <button class="btn retry-btn" id="refreshBtn" style="cursor: pointer;">
            <i class="fas fa-redo"></i> Refresh Page
        </button>
    </div>

    <script>
        const retryBtn = document.getElementById('retryBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        
        retryBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                alert('Still offline. Please check your connection.');
            }
        });
        
        refreshBtn.addEventListener('click', () => {
            if (navigator.onLine) {
                window.location.reload();
            } else {
                alert('No connection detected. Please check your network.');
            }
        });
        
        // Check online status and auto redirect
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
